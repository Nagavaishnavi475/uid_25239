<!DOCTYPE html>
<html>
<head>
<style>
body {
  height: 100vh;
  display: flex;
  align-items: center;
}

.circle {
  width: 80px;
  height: 80px;
  background-color: green;
  border-radius: 50%;
  position: relative;
  animation: moveRotate 3s linear infinite;
}

@keyframes moveRotate {
  0% {
    left: 0;
    transform: rotate(0deg);
  }
  50% {
    left: 300px;
    transform: rotate(180deg);
  }
  100% {
    left: 0;
    transform: rotate(360deg);
  }
}
</style>
</head>
<body>

<div class="circle"></div>

</body>
</html>
