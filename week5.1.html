<!DOCTYPE html>
<html>
<head>
    <title>Card Layout</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 50px;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.9);
            width: 250px;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .card h2 {
            margin-bottom: 20px;
        }

        .card button {
            padding: 10px 15px;
            border: none;
            background-color: green;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .card button:hover {
            background-color: darkgreen;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="card">
            <h2>South Korea</h2>
            <button>Learn More</button>
        </div>

        <div class="card">
            <h2>Seoul</h2>
            <button>Learn More</button>
        </div>

        <div class="card">
            <h2>Jeju Island</h2>
            <button>Learn More</button>
        </div>

    </div>

</body>
</html>
