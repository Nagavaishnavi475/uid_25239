<!DOCTYPE html>
<html>
<head>
<title>E-Commerce Store</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
margin:0;
}

.header{
background:#2f6fd6;
color:white;
text-align:center;
padding:20px;
font-size:24px;
}

.sale{
background:#f4b400;
text-align:center;
padding:12px;
font-weight:bold;
}

.container{
display:flex;
padding:20px;
}

.categories{
width:200px;
background:white;
padding:15px;
border-radius:8px;
}

.categories p{
border-bottom:1px solid #ccc;
padding:8px 0;
}

.products{
display:grid;
grid-template-columns:repeat(2,200px);
gap:20px;
margin-left:30px;
}

.card{
background:white;
padding:15px;
text-align:center;
border-radius:8px;
}

.card img{
width:80px;
height:80px;
}

button{
background:#2f6fd6;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
}

</style>
</head>

<body>

<div class="header">
My E-Commerce Store
</div>

<div class="sale">
 Big Sale! Up to 50% Off 
</div>

<div class="container">

<div class="categories">
<h3>Categories</h3>
<p>Electronics</p>
<p>Clothing</p>
<p>Home Appliances</p>
<p>Books</p>
</div>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/80">
<h3>Electronics</h3>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/80">
<h3>Clothing</h3>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/80">
<h3>Home Appliances</h3>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/80">
<h3>Books</h3>
<button>Add to Cart</button>
</div>

</div>

</div>

</body>
</html>
