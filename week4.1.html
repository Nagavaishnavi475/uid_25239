<!DOCTYPE html>
<html>
<head>
    <title>College Admission Registration</title>
</head>

<body bgcolor="pink">

    <h2 align="center">College Admission Registration</h2>

    <form>
        <table border="1" align="center" cellpadding="10" cellspacing="0" width="60%">
            
            <tr>
                <td>Full Name:</td>
                <td><input type="text" size="40"></td>
            </tr>

            <tr>
                <td>Email:</td>
                <td><input type="email" size="40"></td>
            </tr>

            <tr>
                <td>Phone Number:</td>
                <td><input type="tel" size="40"></td>
            </tr>

            <tr>
                <td>Gender:</td>
                <td>
                    <input type="radio" name="gender"> Male
                    <input type="radio" name="gender"> Female
                    <input type="radio" name="gender"> Other
                </td>
            </tr>

            <tr>
                <td>Course Applying For:</td>
                <td>
                    <select>
                        <option>B.Tech</option>
                        <option>B.Sc</option>
                        <option>B.Com</option>
                        <option>BBA</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Hobbies:</td>
                <td>
                    <input type="checkbox"> Sports
                    <input type="checkbox"> Music
                    <input type="checkbox"> Reading
                </td>
            </tr>

            <tr>
                <td>Date of Birth:</td>
                <td><input type="date"></td>
            </tr>

            <tr>
                <td>Upload Certificates:</td>
                <td><input type="file"></td>
            </tr>

            <tr>
                <td>Address:</td>
                <td><textarea rows="4" cols="40"></textarea></td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>

        </table>
    </form>

</body>
</html>
